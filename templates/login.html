<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.login-container{
width:90%;
max-width:350px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.login-container h2{
text-align:center;
color:white;
margin-bottom:25px;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(to right,#ff7a18,#ffb347);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="login-container">

<h2>Student Login</h2>

<form method="POST">

{% csrf_token %}

<div class="input-box">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
