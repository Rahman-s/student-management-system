<!DOCTYPE html>
<html>
<head>

<title>Update Student</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:90%;
max-width:400px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#FFC107;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Update Student</h1>

<form method="POST">

{% csrf_token %}

<input type="text" name="name" value="{{student.name}}">

<input type="number" name="age" value="{{student.age}}">

<input type="text" name="course" value="{{student.course}}">

<button type="submit">Update Student</button>

</form>

</div>

</body>
</html>
